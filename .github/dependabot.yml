version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - docker
